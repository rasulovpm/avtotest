# avtoimtixon.uz reverse proxy
# HTTP only by default. To enable HTTPS:
#   1) Place fullchain.pem + privkey.pem into ./nginx/certs/
#   2) Uncomment the `server { listen 443 ssl ... }` block below
#   3) Restart nginx:  docker compose -f docker-compose.prod.yml restart nginx

upstream nextjs_upstream {
  server app:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  client_max_body_size 10m;

  # Serve uploaded files directly from volume (faster than going through Node)
  location /uploads/ {
    alias /var/www/uploads/;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Next.js static assets — long cache
  location /_next/static/ {
    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_cache_bypass $http_upgrade;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_buffering off;
  }
}

