version: "3.9"

# Production stack for avtoimtixon.uz
# - app:   Next.js (standalone) + Prisma (SQLite, persistent volume)
# - nginx: reverse proxy on :80 (and :443 if certs are mounted)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: avtoimtixon-app:latest
    container_name: avtoimtixon-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # SQLite file lives inside the named volume mounted at /app/data
      DATABASE_URL: "file:/app/data/prod.db"
    volumes:
      - app-data:/app/data
      - app-uploads:/app/public/uploads
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: avtoimtixon-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - app-uploads:/var/www/uploads:ro

volumes:
  app-data:
  app-uploads:
